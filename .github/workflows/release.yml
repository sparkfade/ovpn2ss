name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libmbedtls-dev \
            libfmt-dev

      - name: Configure
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOVPN2SS_STUB_OPENVPN3=OFF \
            -DOVPN2SS_OPENVPN3_DIR=./third_party/openvpn3 \
            -DOVPN2SS_BUILD_APP=ON \
            -DOVPN2SS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-release

      - name: Test
        run: ctest --test-dir build-release --output-on-failure

      - name: Package binary
        run: |
          version="${GITHUB_REF_NAME}"
          cp build-release/ovpn2ss_app "ovpn2ss-${version}-linux-x86_64"
          sha256sum "ovpn2ss-${version}-linux-x86_64" > "ovpn2ss-${version}-linux-x86_64.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ovpn2ss-*-linux-x86_64
            ovpn2ss-*-linux-x86_64.sha256
